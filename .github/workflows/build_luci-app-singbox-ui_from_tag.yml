name: Build luci-app-singbox-ui from TAG
run-name: Build release TAG ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sync-version:
    name: Sync Version To Branch
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.tag.outputs.tag_version }}
      target_branch: ${{ steps.branch.outputs.target_branch }}
      sync_sha: ${{ steps.sync.outputs.sync_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 0

      - name: Parse Tag Version
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG_NAME#v}"

          if [ "$TAG_VERSION" = "$TAG_NAME" ]; then
            echo "Tag must start with 'v' (example: v1.2.3)." >&2
            exit 1
          fi

          if ! [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag version: $TAG_VERSION" >&2
            exit 1
          fi

          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect Target Branch From Tag Commit
        id: branch
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          git fetch origin "+refs/heads/*:refs/remotes/origin/*"

          mapfile -t BRANCHES < <(git branch -r --contains "$GITHUB_SHA" | sed 's/^[*[:space:]]*//' | grep -v 'origin/HEAD' | sed 's#^origin/##' || true)

          TARGET_BRANCH=""
          for b in "${BRANCHES[@]}"; do
            if [ "$b" != "$DEFAULT_BRANCH" ]; then
              TARGET_BRANCH="$b"
              break
            fi
          done

          if [ -z "$TARGET_BRANCH" ] && [ "${#BRANCHES[@]}" -gt 0 ]; then
            TARGET_BRANCH="${BRANCHES[0]}"
          fi

          if [ -z "$TARGET_BRANCH" ]; then
            TARGET_BRANCH="$DEFAULT_BRANCH"
          fi

          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "Will sync version in branch: $TARGET_BRANCH"

      - name: Sync Version In Makefile And Push
        id: sync
        shell: bash
        env:
          TAG_VERSION: ${{ steps.tag.outputs.tag_version }}
          TARGET_BRANCH: ${{ steps.branch.outputs.target_branch }}
        run: |
          set -euo pipefail

          if git show-ref --verify --quiet "refs/remotes/origin/${TARGET_BRANCH}"; then
            git switch -C "${TARGET_BRANCH}" "origin/${TARGET_BRANCH}"
          else
            git switch --detach
          fi

          sed -i "s/^PKG_VERSION:=.*$/PKG_VERSION:=${TAG_VERSION}/" luci-app-singbox-ui/Makefile

          if git diff --quiet; then
            echo "No version changes detected."
          else
            git add luci-app-singbox-ui/Makefile
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "github-actions[bot]: sync Makefile version to v${TAG_VERSION}"

            if git show-ref --verify --quiet "refs/remotes/origin/${TARGET_BRANCH}"; then
              git push origin "HEAD:${TARGET_BRANCH}"
            else
              echo "Target branch '${TARGET_BRANCH}' not found. Skipping push."
            fi
          fi

          echo "sync_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.pkg_type }})
    runs-on: ubuntu-latest
    needs: sync-version
    strategy:
      fail-fast: false
      matrix:
        pkg_type: [ipk, apk]

    steps:
      - name: Checkout Synced Commit
        uses: actions/checkout@v5.0.0
        with:
          ref: ${{ needs.sync-version.outputs.sync_sha }}
          fetch-depth: 0

      - name: Ensure Version Equals Tag
        shell: bash
        run: |
          set -euo pipefail
          sed -i "s/^PKG_VERSION:=.*$/PKG_VERSION:=${{ needs.sync-version.outputs.tag_version }}/" luci-app-singbox-ui/Makefile

      - name: Build Docker Image (${{ matrix.pkg_type }})
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          file: Dockerfile-${{ matrix.pkg_type }}
          tags: singbox-ui-${{ matrix.pkg_type }}:ci

      - name: Create Docker Container
        run: docker create --name singbox-ui-${{ matrix.pkg_type }} singbox-ui-${{ matrix.pkg_type }}:ci

      - name: Copy Package From Docker Container
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./pkg-out
          docker cp singbox-ui-${{ matrix.pkg_type }}:/builder/bin/packages/x86_64/luci/. ./bin-${{ matrix.pkg_type }}/
          if [ "${{ matrix.pkg_type }}" = "ipk" ]; then
            cp ./bin-${{ matrix.pkg_type }}/luci-app-singbox-ui*.ipk ./pkg-out/luci-app-singbox-ui.ipk
          else
            cp ./bin-${{ matrix.pkg_type }}/luci-app-singbox-ui*.apk ./pkg-out/luci-app-singbox-ui.apk
          fi

      - name: Remove Docker Container
        if: always()
        run: docker rm -f singbox-ui-${{ matrix.pkg_type }} || true

      - name: Upload Built Package
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pkg-${{ matrix.pkg_type }}
          path: pkg-out/

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - sync-version
      - build

    steps:
      - name: Download IPK Artifact
        uses: actions/download-artifact@v4
        with:
          name: pkg-ipk
          path: release-ipk/

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: pkg-apk
          path: release-apk/

      - name: Generate Release Notes
        shell: bash
        run: |
          cat > release_notes.md <<'EOF'
          ## singbox-ui ${{ github.ref_name }}

          - Tag version: `${{ needs.sync-version.outputs.tag_version }}`
          - Source branch: `${{ needs.sync-version.outputs.target_branch }}`
          - Source commit: `${{ needs.sync-version.outputs.sync_sha }}`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.4.0
        with:
          tag_name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            release-ipk/*.ipk
            release-apk/*.apk
          draft: false
          prerelease: false
